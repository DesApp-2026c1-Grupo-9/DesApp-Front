<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Estudiante - Sprint 1</title>
</head>
<body>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js" crossorigin></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js" crossorigin></script>
    <script src="https://unpkg.com/@mui/material@5.15.11/umd/material-ui.production.min.js" crossorigin></script>

    <div id="root"></div>

    <script type="text/babel">
        const { ThemeProvider, createTheme, Card, CardContent, Avatar, Typography, Box, Container, List, ListItem, ListItemText, Button } = MaterialUI;
        const theme = createTheme({
            palette: {
                primary: { main: '#1976d2' },
                secondary: { main: '#dc004e' }
            }
        });

        function Perfil() {
            return (
                <ThemeProvider theme={theme}>
                    <Container maxWidth="md">
                        <Box sx={{ my: 4 }}>
                            <Card>
                                <CardContent>
                                    <Box sx={{ display: 'flex', alignItems: 'center', mb: 3 }}>
                                        <Avatar sx={{ width: 80, height: 80, mr: 3 }} />
                                        <Box>
                                            <Typography variant="h5">Francisco García</Typography>
                                            <Typography variant="body2" color="text.secondary">
                                                Ingeniería en Sistemas - 3er Año
                                            </Typography>
                                        </Box>
                                    </Box>
                                    <List>
                                        <ListItem><ListItemText primary="Correo" secondary="francisco@universidad.edu" /></ListItem>
                                        <ListItem><ListItemText primary="Avance" secondary="45% de la carrera completado" /></ListItem>
                                        <ListItem><ListItemText primary="Privacidad" secondary="Perfil Público" /></ListItem>
                                    </List>
                                    <Button variant="outlined" fullWidth>Editar Perfil</Button>
                                </CardContent>
                            </Card>
                        </Box>
                    </Container>
                </ThemeProvider>
            );
        }

        ReactDOM.render(<Perfil />, document.getElementById('root'));
    </script>
</body>
</html>
