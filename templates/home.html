<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Sistema de Acompañamiento Estudiantil</title>
</head>
<body>
    <!-- Correct MUI v5 + React 18 + Emotion CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js" crossorigin></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js" crossorigin></script>
    <script src="https://unpkg.com/@mui/material@5.15.11/umd/material-ui.production.min.js" crossorigin></script>

    <div id="root"></div>

    <script type="text/babel">
        const { ThemeProvider, createTheme, AppBar, Toolbar, Typography, Button, Container, Box } = MaterialUI;
        const theme = createTheme({
            palette: {
                primary: { main: '#1976d2' },
                secondary: { main: '#dc004e' }
            }
        });

        function Home() {
            return (
                <ThemeProvider theme={theme}>
                    <AppBar position="static">
                        <Toolbar>
                            <Typography variant="h6" sx={{ flexGrow: 1 }}>
                                Sistema de Acompañamiento Estudiantil
                            </Typography>
                            <Button color="inherit" href="login.html">Iniciar Sesión</Button>
                        </Toolbar>
                    </AppBar>
                    <Container maxWidth="md">
                        <Box sx={{ my: 4 }}>
                            <Typography variant="h4" gutterBottom>
                                Bienvenido al Sistema de Acompañamiento Estudiantil
                            </Typography>
                            <Typography variant="body1">
                                Gestiona tu trayectoria académica, conecta con estudiantes y organiza sesiones de estudio colaborativas.
                            </Typography>
                        </Box>
                    </Container>
                </ThemeProvider>
            );
        }

        ReactDOM.render(<Home />, document.getElementById('root'));
    </script>
</body>
</html>
