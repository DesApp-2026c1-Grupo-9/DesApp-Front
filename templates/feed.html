<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed de Novedades - Sprint 1</title>
</head>
<body>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js" crossorigin></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js" crossorigin></script>
    <script src="https://unpkg.com/@mui/material@5.15.11/umd/material-ui.production.min.js" crossorigin></script>

    <div id="root"></div>

    <script type="text/babel">
        const { ThemeProvider, createTheme, Container, Box, Typography, Card, CardContent, TextField, Button, Avatar, IconButton, CardActions } = MaterialUI;
        const theme = createTheme({
            palette: {
                primary: { main: '#1976d2' },
                secondary: { main: '#dc004e' }
            }
        });

        const mockPosts = [
            { id: 1, autor: 'María López', contenido: 'Acabo de aprobar Algoritmos! 🎉', fecha: '2026-04-26' },
            { id: 2, autor: 'Juan Martínez', contenido: 'Nueva sesión de estudio para Base de Datos el viernes', fecha: '2026-04-25' }
        ];

        function Feed() {
            return (
                <ThemeProvider theme={theme}>
                    <Container maxWidth="md">
                        <Box sx={{ my: 4 }}>
                            <Typography variant="h4" gutterBottom>Feed de Novedades</Typography>
                            <Card sx={{ mb: 3 }}>
                                <CardContent>
                                    <Typography variant="h6" gutterBottom>Crear Publicación</Typography>
                                    <TextField fullWidth multiline rows={3} label="¿Qué estás pensando?" variant="outlined" sx={{ mb: 2 }} />
                                    <Button variant="contained">Publicar</Button>
                                </CardContent>
                            </Card>
                            {mockPosts.map((post) => (
                                <Card key={post.id} sx={{ mb: 2 }}>
                                    <CardContent>
                                        <Box sx={{ display: 'flex', alignItems: 'center', mb: 2 }}>
                                            <Avatar sx={{ mr: 2 }} />
                                            <Box>
                                                <Typography variant="subtitle1">{post.autor}</Typography>
                                                <Typography variant="caption" color="text.secondary">{post.fecha}</Typography>
                                            </Box>
                                        </Box>
                                        <Typography variant="body1">{post.contenido}</Typography>
                                    </CardContent>
                                    <CardActions>
                                        <IconButton>👍</IconButton>
                                        <IconButton>👎</IconButton>
                                        <Button size="small">Comentar</Button>
                                    </CardActions>
                                </Card>
                            ))}
                        </Box>
                    </Container>
                </ThemeProvider>
            );
        }

        ReactDOM.render(<Feed />, document.getElementById('root'));
    </script>
</body>
</html>
